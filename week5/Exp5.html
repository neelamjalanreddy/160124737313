<!doctype html>
<html>
<head>
  <title>Exp5</title>
  <style>
    body {
      background-color: #f0f8ff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .box {
      background-color: #ffffff;
      padding: 30px;
      border: 2px solid #ccc;
      width: 320px;
    }

    h2 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #2e8b57;
      color: white;
      border: none;
      cursor: pointer;
    }

    .output {
      margin-top: 15px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Salary Calculator</h2>

    <input type="text" id="emp" placeholder="Enter Name">
    <input type="number" id="salary" placeholder="Enter Basic Salary">

    <button onclick="showSalary()">Calculate</button>

    <div class="output" id="result"></div>
  </div>

<script>
  function Worker(name, basic, hra = 2000, ta = 1000) {
    this.name = name;
    this.basic = basic;
    this.hra = hra;
    this.ta = ta;

    this.getNetSalary = function () {
      let gross = this.basic + this.hra + this.ta;
      let tax = gross * 0.1;
      let net = gross - tax;

      return {
        gross: gross,
        tax: tax,
        net: net
      };
    };
  }

  function showSalary() {
    let name = document.getElementById("emp").value;
    let basic = parseFloat(document.getElementById("salary").value);

    if (name === "" || isNaN(basic)) {
      document.getElementById("result").innerHTML = "Enter valid details";
      return;
    }

    let w = new Worker(name, basic);
    let data = w.getNetSalary();

    document.getElementById("result").innerHTML =
      "Name: " + w.name + "<br>" +
      "Gross Salary: Rs. " + data.gross + "<br>" +
      "Tax (10%): Rs. " + data.tax + "<br>" +
      "Net Salary: Rs. " + data.net;
  }
</script>

</body>
</html>
