<!DOCTYPE html>
<html>
<head>
    <title>Exp2</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            font-family:Arial, Helvetica, sans-serif;
        }

        .calculator{
            background:#1e1e2f;
            padding:25px;
            border-radius:15px;
            width:320px;
            box-shadow:0 15px 30px rgba(0,0,0,0.4);
        }

        .display{
            width:100%;
            height:60px;
            border:none;
            border-radius:10px;
            margin-bottom:20px;
            font-size:22px;
            text-align:right;
            padding-right:15px;
            background:#f5f5f5;
            outline:none;
        }

        .buttons{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:12px;
        }

        button{
            height:60px;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
            transition:0.2s ease;
        }

        button:hover{
            transform:scale(1.05);
        }

        .number{
            background:#2dce89;
            color:white;
        }

        .operator{
            background:#ff6b6b;
            color:white;
        }

        .equal{
            background:#339af0;
            color:white;
        }

        .clear{
            background:#ffd43b;
        }
    </style>
</head>

<body>

    <div class="calculator">
        <input type="text" class="display" id="display" readonly>

        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendValue('(')">(</button>
            <button class="operator" onclick="appendValue(')')">)</button>
            <button class="operator" onclick="appendValue('/')">/</button>

            <button class="number" onclick="appendValue('7')">7</button>
            <button class="number" onclick="appendValue('8')">8</button>
            <button class="number" onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('*')">*</button>

            <button class="number" onclick="appendValue('4')">4</button>
            <button class="number" onclick="appendValue('5')">5</button>
            <button class="number" onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('-')">-</button>

            <button class="number" onclick="appendValue('1')">1</button>
            <button class="number" onclick="appendValue('2')">2</button>
            <button class="number" onclick="appendValue('3')">3</button>
            <button class="operator" onclick="appendValue('+')">+</button>

            <button class="number" onclick="appendValue('0')">0</button>
            <button class="number" onclick="appendValue('.')">.</button>
            <button class="equal" onclick="calculateResult()">=</button>
        </div>
    </div>

<script>
    const display = document.getElementById("display");

    function appendValue(value){
        display.value += value;
    }

    function clearDisplay(){
        display.value = "";
    }

    function calculateResult(){
        try{
            display.value = eval(display.value);
        }
        catch{
            display.value = "Error";
        }
    }
</script>

</body>
</html>
