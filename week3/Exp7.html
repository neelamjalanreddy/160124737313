<!DOCTYPE HTML>
<html>
  <head>
    <title>Exp7</title>
    <style>
      body{
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header{
        background-color:aquamarine;
        color:brown;
        text-align: center;
        padding: 20px;
      }

      .content{
        display:flex;
        flex:1;
      }

      .sidebar{
        width:25%;
        background-color:aqua;
        padding:20px;
      }

      .main{
        flex:1;
        background-color:darkgray;
        color:chartreuse;
        text-align: center;
        padding:15px;
      }

      @media(max-width:786px){
        .content{
          flex-direction:column;
        }
        .sidebar{
          width:100%;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Header Section</h1>
    </header>
    <div class="content">
      <div class="sideabr">
        <h2>Sdiebar</h2>
        <p>Navigation links</p>
      </div>
      <div class="main">
        <h2>Main content</h2>
        <p>This is the main content area of webpage</p>
      </div>
    </div>

    <footer>
      <p>Footer Section</p>
    </footer>
  </body>
</html>
