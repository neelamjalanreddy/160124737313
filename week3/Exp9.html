<!DOCTYPE html>
<html>
  <head>
    <title>Exp9</title>
    <style>
      .container{
        display: flex;
        flex-direction: row;
        gap: 20px;
        padding: 20px;
      }

      .box{
        flex:1;
        padding: 40px;
        background-color: #4CAF50;
        color:white;
        text-align: center;
        font-size: 20px;
        border-radius: 8px;
      }

      @media(max-width: 768px){
        .container{
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">Section 1</div>
      <div class="box">Section 2</div>
      <div class="box">Section 3</div>
    </div>
  </body>
</html>
