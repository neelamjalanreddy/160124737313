<!DOCTYPE html>
<html>
  <head>
    <title>Exp8</title>
    <style>
      body{
        margin:0;
        background-color:aqua;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
      }

      .login-container{
        background-color: white;
        padding: 30px;
        width: 300px;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      }

      h2{
        text-align:center;
        margin-bottom: 20px;
      }

      input{
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 14px;
      }

      input:focus{
        border-color:black;
        outline: none;
        box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
      }

      button{
        width:  100%;
        padding: 10px;
        border: none;
        background-color:aqua;
        color:crimson;
        font-size: 16px;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover{
        background-color:aquamarine;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h2>Login</h2>
      <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholderr="Password" required>
        <button type="submit">Login</button>    
      </form>
    </div>
  </body>
</html>
