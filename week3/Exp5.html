<!DOCTYPE html>
<html>
  <head>
    <style>
      #box1{
        font-size:42px;
        width:160px;
        text-align:center;
        padding:75px;
        height:110px;
        position:static;
        margin-bottom: 50px;
      }
      #box2{
        font-size:42px;
        margin-top: 50px;
        padding:75px;
        height: 110px;
        width:160px;
        margin-bottom: 55px;
        position:relative;
      }
      #box3{
        font-size:42px;
        position:absolute;
        padding :75px;
        height:110px;
        width: 160px;
      }
    </style>
  </head>
  <body>
    <div id="box1" style="background-color:red">Static</div><br>
    <div id="box2" style="background-color:yellow">Relative</div><br>
    <div id="box3" style="background-color:green">Absolute</div>
  </body>
</html>
