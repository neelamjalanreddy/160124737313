<!DOCTYPE html>
<html>
  <head>
    <style>
      ul{
        display: flex;
        margin:0;
        padding:0;
        list-style:none;
        border-color:black;
      }
      ul li{
        margin-right:16px;
        cursor:pointer;
        transition: 0.5s;
      }
      ul li:hover{
        background-color:aqua;
      }
    </style>
  </head>
  <body>
    <ul>
      <li>Home</li>
      <li>About</li>
      <li>Services</li>
      <li>Contact</li>
    </ul>
  </body>
</html>
