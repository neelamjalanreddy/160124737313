<!DOCTYPE html>
<html>
<head>
  <title>Exp6</title>
  <style>
    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      height: 100vh;
      flex-wrap: wrap;
    }

    .box {
      width: 120px;
      height: 120px;
      background-color: aqua;
      color:white;
      display: flex;
      justify-content: center;
      align-items:center;
      font-size: 20px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="box">Box1</div>
    <div class="box">Box2</div>
    <div class="box">Box3</div>
    <div class="box">Box4</div>
  </div>
</body>
</html>
