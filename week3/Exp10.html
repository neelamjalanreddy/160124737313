<!DOCTYPE html>
<html>
  <head>
    <title>Exp10</title>
    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
      }

      body{
        font-family:'Times New Roman', Times, serif;
      }

      header{
        background-color: darkblue;
        color:white;
        padding:15px;
      }

      nav{
        display:flex;
        gap:15px;
        margin-top:10px;
      }

      nav a{
        color:white;
        text-decoration: none;
      }

      .container{
        display: flex;
        padding: 20px;
        gap: 20px;
      }

      .main{
        flex:3;
        background-color:lightgray;
        padding:20px;
      }

      .sidebar{
        flex:1;
        background-color:lightblue;
        padding: 20px;
      }

      footer{
        background-color:darkblue;
        color:white;
        text-align: center;
        padding: 10px;
      }

      @media(max-width: 768px){
        .container{
          flex-direction:column;
        }

        nav{
          flex-direction:column;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>CBIT College</h1>
      <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Courses</a>
        <a href="#">Content</a>
      </nav>
    </header>

    <div class="container">
      <div class="main">
        <h2>Welcome to CBIT College</h2>
        <p>This is the main content area of the website.</p>
      </div>

      <div class="sidebar">
        <h3>News</h3>
        <p>Admissons Open</p>
        <p>Annual Fest Soon</p>
      </div>
    </div>

    <footer>
      <p>2026 CBIT College</p>
    </footer>
  </body>
</html>
