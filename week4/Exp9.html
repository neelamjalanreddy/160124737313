<!DOCTYPE html>
<html>
  <head>
    <title>Exp9</title>
    <style>
      body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        margin:0;
        background-color:#f4f4f4;
        font-family:'Times New Roman', Times, serif;
      }

      .card{
        width:300px;
        background-color:white;
        padding:20px;
        border-radius:12px;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
        text-align:center;
      }

      .card h2{
        margin-bottom:10px;
        color:darkblue;
      }

      .card p{
        font-size:14px;
        color:#555;
        margin-bottom:15px;
      }

      .card button{
        padding:8px 15px;
        border:none;
        background-color:darkblue;
        color:white;
        border-radius:6px;
        cursor:pointer;
      }

      .card button:hover{
        background-color:navy;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>B.tech - IT</h2>
      <p>This course covers programming,database,web development and networking</p>
      <button>View Details</button>
    </div>
  </body>
</html>
