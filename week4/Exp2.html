<!DOCTYPE html>
<hmtl>
    <head>
        <title>Exp2</title>
        <style>
          table{
            margin: 30px auto;
            border-collapse: collapse;
            width:60%;
          }

          th,td{
            border:1px solid black;
            padding: 10px;
            text-align:center;
          }

          th{
            background-color: darkblue;
            color:white;
          }

          tr:nth-child(even){
            background-color:aqua;
          }
        </style>
    </head>
    <body>
         <table border="1">
            <tr>
                <th>Subject</th>
                <th>Student name</th>
                <th>Marks</th>
            </tr>
            <tr>
                <td>EAD</td>
                <td>ABC</td>
                <td>81</td>
            </tr>
        </table>
        
    </body>
</hmtl>
