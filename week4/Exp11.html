<!DOCTYPE html>
<html>
  <head>
    <title>Exp11</title>
    <style>
      body{
        margin:0;
        font-family:'Times New Roman', Times, serif;
        background-color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
      }

      .login-box{
        background-color:white;
        padding:30px;
        width:300px;
        border-radius:10px;
        box-shadow:0 4px 10px rgba(0,0,0,0.2);
        text-align:center;
      }

      h2{
        margin-bottom:20px;
        color:darkblue;
      }

      input{
        width:100%;
        padding:10px;
        margin:10px 0;
        border:1px solid white;
        border-radius:5px;
        font-size:14px;
      }

      input:focus{
        border-color:darkblue;
        outline:none;
        box-shadow:0 0 5px rgba(0,0,139,0.3);
      }

      button{
        width:100%;
        padding:10px;
        margin-top:10px;
        border:none;
        background-color:darkblue;
        color:white;
        font-size:16px;
        border-radius:5px;
        cursor:pointer;
        transition:0.3s;
      }

      button:hover{
        background-color:navy;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h2>Login</h2>
      <form>
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Login</button>
      </form>
    </div>
  </body>
</html>
