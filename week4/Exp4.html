<!doctype html>
<html>

<head>
    <title>Introduction to MERN Stack</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            outline: none;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        header {
            width: 100%;
            background-color: brown;
            padding: 15px 0px;
            margin-bottom: 20px;
        }

        header h1 {
            color: aqua;
            text-align: center;
            font-style: inherit;
        }

        .container {
            width: 80%;
            margin: auto;
            background-color: #dbbaba;
        }

        .container p {
            font-size: 16px;
            padding: 15px 15px;
        }

        .container .listClass {
            background-color: yellowgreen;
            margin: 15px 0px;
        }

        .container .listClass ol li {
            list-style-type: none;
            padding: 5px 15px;
            font-size: 16px;
        }

        .container .listClass ol li:hover {
            font-size: 18px;
            text-decoration: underline;
            cursor:pointer;
        }

        .container img{
            border: solid;
            box-shadow: 8px 1px 6px 1px rgb(0, 0, 0);
            padding-bottom: 20px;
        }w

        .container a:hover{
            color:aqua;
            cursor:pointer;
            transition:0.3s;
            box-shadow: 0px 0px 5px 0px black;
        }

    </style>
</head>

<body>

    <header>
        <h1>Introduction to MERN Stack</h1>
    </header>

    <div class="container">
        <p>The MERN stack is a set of technologies used together to build modern web applications. It stands for
            Mongo DB,Express JS,React JS,Node JS.
        </p>

        <div class="listClass">
            <ol>
                <li>MongoDB</li>
                <li>Express.js</li>
                <li>React</li>
                <li>Node.js</li>
            </ol>
        </div>

        <img src="mern.png" width="20%" height="60%"> <br>
        <a href="https://www.mongodb.com/?msockid=19bebd26500863f03721aeeb515a6296" target="_blank">mongodb</a>
    </div>
</body>

</html>
