<!DOCTYPE html>
<hmtl>
    <head>
        <title>forms</title>
        <style>
          body{
            font-family:'Times New Roman', Times, serif;
          }

          form{
            width:300px;
            margin: 40px auto;
          }

          fieldset{
            border: 2px solid darkblue;
            padding: 20px;
            border-radius: 8px;
          }

          legend{
            font-size:18px;
            font-weight:bold;
            color:darkblue;
            padding:0 10px;
          }

          input{
            width:100%;
            padding:8px;
            margin:8px 0;
            border:1px s0lid gray;
            border-radius:4px;
          }

          button{
            width:100%;
            padding:8px;
            background-color:darkblue;
            color:white;
            border:none;
            border-radius:4px;
            cursor:pointer;
          }

          button:hover{
            background-color:navy;
          }
        </style>
    </head>
    <body>
        <form>
            <label>Name:</label><input type="name"><br>
            <label>Gmail:</label><input type="gmail"><br>
            <label>Password:</label><input type="password"><br>
            <button>Submit</button>
        </form>
    </body>
</hmtl>
